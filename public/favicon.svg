<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="stillGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="60%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.8" />
    </radialGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#181c2e" />
      <stop offset="100%" stop-color="#080b12" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#a78bfa" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Dark Background Badge -->
  <rect width="64" height="64" rx="18" fill="url(#bgGrad)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Outer Orbiting Ring -->
  <circle cx="32" cy="32" r="21" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5" />

  <!-- Core Glowing STILL Sphere -->
  <circle cx="32" cy="32" r="14" fill="url(#stillGlow)" filter="url(#shadow)" />

  <!-- Inner Radiant Accent Dot -->
  <circle cx="32" cy="32" r="4.5" fill="#ffffff" opacity="0.9" />
</svg>